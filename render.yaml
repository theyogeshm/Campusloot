services:
  # Express Backend Web Service
  - type: web
    name: campusloot-backend
    plan: free
    env: node
    buildCommand: npm install
    startCommand: npm start
    rootDir: backend
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false # Set your MongoDB Atlas connection string in the Render Dashboard
      - key: JWT_SECRET
        generateValue: true # Generates a random secret key automatically
      - key: SUPER_ADMIN_EMAIL
        value: admin@example.com

  # React Frontend Static Site
  - type: web
    name: campusloot-frontend
    plan: free
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false # Set manually in Render Dashboard (e.g., https://your-backend.onrender.com/api)
    routes:
      - source: /*
        destination: /index.html
        type: rewrite
